api:
  host: kargo.whispr.epitech.beer
  adminAccount:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      kubernetes.io/ingress.class: "nginx"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    tls:
      enabled: true
      selfSignedCert: false
  oidc:
    enabled: true
    admins:
      claims:
        groups:
          - whispr-messenger:whispr-team
    dex:
      enabled: true
      envFrom:
        - secretRef:
            name: kargo-github-oauth
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $GITHUB_CLIENT_ID
            clientSecret: $GITHUB_CLIENT_SECRET
            redirectURI: https://kargo.whispr.epitech.beer/dex/callback
            orgs:
              - name: whispr-messenger
