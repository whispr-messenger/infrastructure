{{- /*
  Grafana dashboard ConfigMap — auto-generated from JSON files in dashboards/.
  The sidecar picks these up via the grafana_dashboard label.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
    grafana_dashboard: "1"
data:
  cluster-overview.json: |-
    {{ .Files.Get "dashboards/cluster-overview.json" | nindent 4 }}
  ingress-overview.json: |-
    {{ .Files.Get "dashboards/ingress-overview.json" | nindent 4 }}
  logs-explorer.json: |-
    {{ .Files.Get "dashboards/logs-explorer.json" | nindent 4 }}
  services-overview.json: |-
    {{ .Files.Get "dashboards/services-overview.json" | nindent 4 }}
  redis-overview.json: |-
    {{ .Files.Get "dashboards/redis-overview.json" | nindent 4 }}
