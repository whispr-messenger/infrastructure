grafana:
  # ------------------------------------------------------------------
  # Admin credentials — injected from Vault via VSO
  # ------------------------------------------------------------------
  admin:
    existingSecret: grafana-admin-secret
    userKey: adminUser
    passwordKey: adminPassword

  # ------------------------------------------------------------------
  # GitHub OAuth — credentials injected from Vault via VSO
  # ------------------------------------------------------------------
  envValueFrom:
    GF_AUTH_GITHUB_CLIENT_ID:
      secretKeyRef:
        name: grafana-oauth-secret
        key: client_id
    GF_AUTH_GITHUB_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oauth-secret
        key: client_secret

  grafana.ini:
    server:
      domain: grafana.whispr.epitech.beer
      root_url: https://grafana.whispr.epitech.beer
    auth.github:
      enabled: true
      allowed_organizations: whispr-messenger
      role_attribute_path: >-
        contains(groups[*], '@whispr-messenger/whispr-team') && 'Admin' || 'Viewer'

  # ------------------------------------------------------------------
  # Security context — run as Grafana user (UID 472)
  # ------------------------------------------------------------------
  securityContext:
    runAsUser: 472
    fsGroup: 472

  # ------------------------------------------------------------------
  # Service
  # ------------------------------------------------------------------
  service:
    type: ClusterIP

  # ------------------------------------------------------------------
  # Persistence
  # ------------------------------------------------------------------
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard-rwo

  # ------------------------------------------------------------------
  # Ingress
  # ------------------------------------------------------------------
  ingress:
    enabled: false

  # ------------------------------------------------------------------
  # Datasources — provisioned via Helm values (not external ConfigMaps)
  # ------------------------------------------------------------------
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          url: http://prometheus-server.monitoring.svc.cluster.local:80
          access: proxy
          isDefault: true
          editable: false
          jsonData:
            timeInterval: "15s"
            httpMethod: POST
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          editable: false
        # WHISPR-1067 : Tempo pour l'exploration des traces OTEL, déployé par
        # argocd/applications/monitoring/tempo.yaml. Le service `tempo`
        # expose le port 3100 (query frontend) ; 4317 est l'OTLP gRPC qui
        # reçoit du Collector (cf. opentelemetry-collector values).
        - name: Tempo
          type: tempo
          uid: tempo
          url: http://tempo.monitoring.svc.cluster.local:3100
          access: proxy
          editable: false
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
              spanStartTimeShift: "-1m"
              spanEndTimeShift: "1m"
            tracesToMetrics:
              datasourceUid: prometheus

  # ------------------------------------------------------------------
  # Dashboard providers — load JSON dashboards from ConfigMaps
  # ------------------------------------------------------------------
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  # ------------------------------------------------------------------
  # Sidecar — auto-discover dashboards and datasources via labels
  # ------------------------------------------------------------------
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /var/lib/grafana/dashboards/default
      searchNamespace: ALL
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"

  # Dashboards are auto-discovered by the sidecar via grafana_dashboard=1 label.
