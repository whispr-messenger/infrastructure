# Grafana Loki — monolithic (single-binary) deployment
# Storage: filesystem (lightweight, suitable for small-to-medium workloads)

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    retention_period: 168h   # 7 days

# Single-binary replicas
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard-rwo

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Disable components not needed in monolithic mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable built-in gateway (we access Loki directly)
gateway:
  enabled: false

# Disable self-monitoring and test
lokiCanary:
  enabled: false
test:
  enabled: false

# Disable chunk cache
chunksCache:
  enabled: false
resultsCache:
  enabled: false
