# Unified production Docker Compose for the Whispr stack.
# Intended for local testing of production images only.
# Actual production runs on GCP Kubernetes via ArgoCD.
#
# Usage: docker compose -f docker/prod/compose.yml --env-file docker/prod/.env up

name: whispr-prod

services:

  ##############################################################################
  # Shared infrastructure
  ##############################################################################

  postgres:
    image: postgres:15-alpine
    container_name: whispr-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - whispr-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whispr-prod-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - whispr-network-prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: whispr-prod-minio
    restart: unless-stopped
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - whispr-network-prod
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  ##############################################################################
  # Microservices
  ##############################################################################

  auth-service:
    image: ghcr.io/whispr-messenger/auth-service/auth-service:latest
    container_name: whispr-prod-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HTTP_PORT: "3001"
      GRPC_PORT: "50056"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: whispr_auth
      DB_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/whispr_auth"
      DB_TYPE: postgres
      DB_MIGRATIONS_RUN: "true"
      DB_SYNCHRONIZE: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_VERIFICATION_SECRET: ${JWT_VERIFICATION_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      USER_SERVICE_GRPC_URL: user-service:50055
      MEDIA_SERVICE_GRPC_URL: media-service:50054
    secrets:
      - jwt_private_key
      - jwt_public_key
    ports:
      - "3001:3001"
      - "50056:50056"
    networks:
      - whispr-network-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/auth/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  user-service:
    image: ghcr.io/whispr-messenger/user-service/user-service:latest
    container_name: whispr-prod-user
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HTTP_PORT: "3002"
      GRPC_PORT: "50055"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: whispr_user
      DB_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/whispr_user"
      DB_MIGRATIONS_RUN: "true"
      DB_SYNCHRONIZE: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "1"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      JWT_JWKS_URL: http://auth-service:3001/auth/v1/.well-known/jwks.json
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_VERIFICATION_SECRET: ${JWT_VERIFICATION_SECRET}
    ports:
      - "3002:3002"
      - "50055:50055"
    networks:
      - whispr-network-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/user/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  media-service:
    image: ghcr.io/whispr-messenger/media-service/media-service:latest
    container_name: whispr-prod-media
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HTTP_PORT: "3003"
      GRPC_PORT: "50054"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: whispr_media
      DB_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/whispr_media"
      DB_TYPE: postgres
      DB_MIGRATIONS_RUN: "true"
      DB_SYNCHRONIZE: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_VERIFICATION_SECRET: ${JWT_VERIFICATION_SECRET}
    ports:
      - "3003:3003"
      - "50054:50054"
    networks:
      - whispr-network-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/media/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  messaging-service:
    image: ghcr.io/whispr-messenger/messaging-service/messaging-service:latest
    container_name: whispr-prod-messaging
    restart: unless-stopped
    environment:
      MIX_ENV: prod
      PHX_HOST: "0.0.0.0"
      HTTP_PORT: "4000"
      GRPC_PORT: "50051"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: whispr_messaging
      DATABASE_URL: "ecto://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/whispr_messaging"
      DB_POOL_SIZE: "10"
      REDIS_MODE: direct
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "2"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY_BASE: ${MESSAGING_SECRET_KEY_BASE}
      ENCRYPTION_KEY: ${MESSAGING_ENCRYPTION_KEY}
      JWT_SECRET: ${MESSAGING_JWT_SECRET}
      AUTH_SERVICE_URL: grpc://auth-service:50056
      USER_SERVICE_URL: grpc://user-service:50055
      MEDIA_SERVICE_URL: grpc://media-service:50054
      NOTIFICATION_SERVICE_URL: grpc://notification-service:4003
      SCHEDULING_SERVICE_GRPC_URL: grpc://scheduling-service:50052
    ports:
      - "4000:4000"
      - "50051:50051"
    networks:
      - whispr-network-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      scheduling-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health?type=live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notification-service:
    image: ghcr.io/whispr-messenger/notification-service:latest
    container_name: whispr-prod-notification
    restart: unless-stopped
    environment:
      MIX_ENV: prod
      PHX_HOST: "0.0.0.0"
      PORT: "4002"
      GRPC_PORT: "4003"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: whispr_notification
      DATABASE_URL: "ecto://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/whispr_notification"
      DB_POOL_SIZE: "10"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "3"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY_BASE: ${NOTIFICATION_SECRET_KEY_BASE}
    ports:
      - "4002:4002"
      - "4003:4003"
    networks:
      - whispr-network-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  scheduling-service:
    image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service:latest
    container_name: whispr-prod-scheduling
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HTTP_PORT: "3004"
      GRPC_PORT: "50052"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: whispr_scheduling
      DB_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/whispr_scheduling"
      DB_TYPE: postgres
      DB_MIGRATIONS_RUN: "true"
      DB_SYNCHRONIZE: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "4"
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_VERIFICATION_SECRET: ${JWT_VERIFICATION_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      MESSAGING_SERVICE_HOST: messaging-service
      MESSAGING_SERVICE_PORT: "4000"
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: "4002"
    ports:
      - "3004:3004"
      - "50052:50052"
    networks:
      - whispr-network-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

##############################################################################
# Volumes & network
##############################################################################

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  whispr-network-prod:
    name: whispr-network-prod
    driver: bridge

secrets:
  jwt_private_key:
    file: ./secrets/jwt_private_key.pem
  jwt_public_key:
    file: ./secrets/jwt_public_key.pem
