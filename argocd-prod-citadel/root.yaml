---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whispr-citadel
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/whispr-messenger/infrastructure.git
    targetRevision: main
    path: argocd-prod-citadel/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
