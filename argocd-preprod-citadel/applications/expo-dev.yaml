---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preprod-expo-dev
  namespace: argocd-preprod
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/whispr-messenger/infrastructure.git
    targetRevision: deploy/preprod
    path: k8s/whispr/preprod/expo-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: whispr-preprod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: expo-url-config
      jsonPointers:
        - /data/url
