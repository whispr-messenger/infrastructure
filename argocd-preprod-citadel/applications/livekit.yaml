---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preprod-livekit
  namespace: argocd-preprod
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://helm.livekit.io
      chart: livekit-server
      targetRevision: 1.7.2
      helm:
        valueFiles:
          - $values/k8s/whispr/preprod/livekit/helm-values.yaml
    - repoURL: https://github.com/whispr-messenger/infrastructure.git
      targetRevision: deploy/preprod
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: whispr-preprod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # The livekit-server ConfigMap is patched out-of-band with real API
    # keys and redis password (see k8s/whispr/preprod/livekit/README.md).
    # We do not commit those secrets to git, so ArgoCD must not try to
    # reconcile `data.config.yaml` back to the placeholder values.
    - group: ""
      kind: ConfigMap
      name: preprod-livekit-livekit-server
      jsonPointers:
        - /data/config.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preprod-livekit-ingress
  namespace: argocd-preprod
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://github.com/whispr-messenger/infrastructure.git
    targetRevision: deploy/preprod
    path: k8s/whispr/preprod/livekit
    directory:
      include: "ingress.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: whispr-preprod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
