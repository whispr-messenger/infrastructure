name: Terraform CI

on:
  pull_request:
    paths:
      - '**.tf'
      - '.github/workflows/terraform-ci.yml'

permissions: {}

jobs:

  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

    strategy:
      matrix:
        tf-dir:
          - terraform/google_kubernetes_engine
          - terraform/kubernetes_cluster
          - terraform/modules/google_kubernetes_engine
          - terraform/modules/kubernetes_cluster

    defaults:
      run:
        working-directory: ${{ matrix.tf-dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

    #   - name: Run tfsec (Security Scanner)
    #     uses: aquasecurity/tfsec-action@v1.0.0
    #     with:
    #       working_directory: ${{ matrix.tf-dir }}
