apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: whispr-preprod
  labels:
    app: messaging-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      containers:
        - name: messaging-service
          image: messaging-service:hotfix-1214
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4010
            - name: grpc
              containerPort: 40010
          envFrom:
            - secretRef:
                name: messaging-service-env
            - configMapRef:
                name: messaging-service-config
          env:
            - name: DATABASE_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: HTTP_PORT
              value: "4010"
            # WHISPR-1229 / WHISPR-1230 : token partagé pour l'appel
            # /internal/v1/contacts/check côté user-service. Sans cet env,
            # http_user_service_client n'envoie pas le header x-internal-token
            # → user-service répond 401 → messaging renvoie 403 "Unable to
            # verify contact relationship".
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: shared-internal-api-token
                  key: INTERNAL_API_TOKEN
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
