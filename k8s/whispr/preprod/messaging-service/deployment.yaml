apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: whispr-preprod
  labels:
    app: messaging-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: messaging-service
          image: ghcr.io/whispr-messenger/messaging-service/messaging-service:sha-08dc4c2
          ports:
            - name: http
              containerPort: 4010
            - name: grpc
              containerPort: 40010
          envFrom:
            - secretRef:
                name: messaging-service-env
          env:
            - name: DATABASE_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: HTTP_PORT
              value: "4010"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /ready
              port: 4010
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /ready
              port: 4010
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4010
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: messaging-service
  namespace: whispr-preprod
spec:
  type: NodePort
  selector:
    app: messaging-service
  ports:
    - name: http
      port: 4010
      targetPort: 4010
      nodePort: 30120
    - name: grpc
      port: 40010
      targetPort: 40010
