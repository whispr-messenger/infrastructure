apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: whispr-gateway
  namespace: whispr-preprod
spec:
  selector:
    istio: gateway
  servers:
  - hosts:
    - preprod-whispr-api.roadmvn.com
    - whispr-preprod.roadmvn.com
    port:
      name: http
      number: 80
      protocol: HTTP
