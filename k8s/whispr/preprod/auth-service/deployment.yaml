apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: whispr-preprod
  labels:
    app: auth-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/whispr-messenger/auth-service/auth-service:sha-05eb3ef
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3010
            - name: grpc
              containerPort: 50010
          envFrom:
            - secretRef:
                name: auth-service-env
            - configMapRef:
                name: auth-service-config
          env:
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 384Mi
              cpu: 500m
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/secrets
              readOnly: true
          startupProbe:
            httpGet:
              path: /auth/v1/health/ready
              port: 3010
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /auth/v1/health/live
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /auth/v1/health/ready
              port: 3010
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
