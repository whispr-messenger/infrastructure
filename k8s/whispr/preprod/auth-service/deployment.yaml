apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: whispr-preprod
  labels:
    app: auth-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/whispr-messenger/auth-service/auth-service:sha-97611d2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3010
            - name: grpc
              containerPort: 50010
          envFrom:
            - secretRef:
                name: auth-service-env
          env:
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /auth/v1/health/ready
              port: 3010
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/secrets
              readOnly: true
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: whispr-preprod
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3010
      targetPort: 3010
      nodePort: 30110
    - name: grpc
      port: 50010
      targetPort: 50010
