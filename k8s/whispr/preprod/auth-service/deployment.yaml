apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: whispr-preprod
  labels:
    app: auth-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/whispr-messenger/auth-service/auth-service:sha-97611d2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3010
            - name: grpc
              containerPort: 50010
          envFrom:
            - secretRef:
                name: auth-service-env
          env:
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
