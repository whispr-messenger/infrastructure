apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-preprod
  namespace: whispr-preprod
  labels:
    app: auth-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 1
  # WHISPR-1066 : chemin critique — pic de login au bootstrap mobile
  # quand un token expire en masse. On plafonne bas pour préserver le
  # cluster dev single-node (89.156.15.147) ; à ajuster en prod.
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
