apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mobile-web
  name: mobile-web
  namespace: whispr-preprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile-web
  template:
    metadata:
      labels:
        app: mobile-web
    spec:
      containers:
        - image: ghcr.io/whispr-messenger/mobile-app/mobile-web:sha-1022920
          imagePullPolicy: Always
          name: mobile-web
          ports:
            - containerPort: 3020
              name: http
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
