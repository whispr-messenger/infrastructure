apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mobile-web
  name: mobile-web
  namespace: whispr-preprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile-web
  template:
    metadata:
      labels:
        app: mobile-web
    spec:
      containers:
        - image: ghcr.io/whispr-messenger/mobile-app/mobile-web:sha-3f0e05c
          imagePullPolicy: Always
          name: mobile-web
          env:
            - name: ALLOWED_ORIGINS
              value: "https://whispr-preprod.roadmvn.com,https://whispr.roadmvn.com"
          ports:
            - containerPort: 3020
              name: http
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /
              port: 3020
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3020
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
