apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-server-config
  namespace: whispr-preprod
data:
  config.yaml: |
    port: 7880
    bind_addresses:
      - "0.0.0.0"
    log_level: info
    rtc:
      tcp_port: 7881
      # WHISPR-1201 : LiveKit ecoute le RTC UDP sur les ports dynamiques de
      # la plage port_range_*, pas sur un single port. udp_port a ete
      # retire car en 1.11 il n'ouvre pas reellement de socket UDP, ce qui
      # cassait les ICE candidates. La plage 50000-50100 est forwardee
      # cote routeur ET cote workstation iptables (whispr-livekit-rtc.sh).
      use_external_ip: true
      port_range_start: 50000
      port_range_end: 50100
    redis:
      address: redis-master.redis.svc.cluster.local:6379
    turn:
      enabled: false
