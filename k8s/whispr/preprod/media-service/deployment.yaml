apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: whispr-preprod
  labels:
    app: media-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ghcr.io/whispr-messenger/media-service/media-service:deploy-preprod
          ports:
            - name: http
              containerPort: 3012
            - name: grpc
              containerPort: 50012
          envFrom:
            - secretRef:
                name: media-service-env
          env:
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: MINIO_ENDPOINT
              value: minio.minio.svc.cluster.local
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: media-service-env
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: media-service-env
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_ENDPOINT
              value: http://minio.minio.svc.cluster.local:9000
            - name: S3_REGION
              value: us-east-1
            - name: NODE_ENV
              value: production
