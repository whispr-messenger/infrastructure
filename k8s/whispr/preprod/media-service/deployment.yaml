apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: whispr-preprod
  labels:
    app: media-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ghcr.io/whispr-messenger/media-service/media-service:sha-6348d34
          ports:
            - name: http
              containerPort: 3012
            - name: grpc
              containerPort: 50012
          envFrom:
            - secretRef:
                name: media-service-env
          env:
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: MINIO_ENDPOINT
              value: minio.minio.svc.cluster.local
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
            - name: S3_ENDPOINT
              value: http://minio.minio.svc.cluster.local:9000
            - name: S3_PUBLIC_ENDPOINT
              value: https://minio-preprod.roadmvn.com
            - name: S3_FORCE_PATH_STYLE
              value: "true"
            - name: S3_REGION
              value: us-east-1
            - name: NODE_ENV
              value: production
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 384Mi
              cpu: 500m
          # WHISPR-1065 : startupProbe laisse le temps au démarrage (Vault
          # handshake + S3 sanity) avant de solliciter le livenessProbe.
          startupProbe:
            httpGet:
              path: /media/v1/health/live
              port: 3012
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /media/v1/health/live
              port: 3012
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /media/v1/health/ready
              port: 3012
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
