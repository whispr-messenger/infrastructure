apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: whispr-preprod
  labels:
    app: media-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ghcr.io/whispr-messenger/media-service/media-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3012
            - name: grpc
              containerPort: 50012
          envFrom:
            - secretRef:
                name: media-service-env
          readinessProbe:
            httpGet:
              path: /media/health/ready
              port: 3012
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: whispr-preprod
spec:
  type: NodePort
  selector:
    app: media-service
  ports:
    - name: http
      port: 3012
      targetPort: 3012
      nodePort: 30112
    - name: grpc
      port: 50012
      targetPort: 50012
