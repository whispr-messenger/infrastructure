apiVersion: apps/v1
kind: Deployment
metadata:
  name: moderation-service
  namespace: whispr-preprod
  labels:
    app: moderation-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: moderation-service
  template:
    metadata:
      labels:
        app: moderation-service
    spec:
      containers:
        - name: moderation-service
          image: ghcr.io/whispr-messenger/moderation-service:preprod
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: moderation-service-env
            - configMapRef:
                name: moderation-config
          env:
            - name: MOD_BLOCK_THRESHOLD
              value: "0.6"
            - name: MOD_MAX_UPLOAD_MB
              value: "10"
            - name: MOD_RATE_LIMIT
              value: "30/minute"
          # WHISPR-1065 : startupProbe couvre le chargement du modèle (plusieurs
          # dizaines de secondes au cold start) avant d'activer le livenessProbe.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
