apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: whispr-preprod
  labels:
    app: notification-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification-service
          image: ghcr.io/whispr-messenger/notification-service:sha-b093fe4
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
          ports:
            - name: http
              containerPort: 4011
            - name: grpc
              containerPort: 40011
          envFrom:
            - secretRef:
                name: notification-service-env
            - configMapRef:
                name: notification-service-config
          env:
            - name: DATABASE_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 384Mi
              cpu: 500m
              # borne le stockage ephemere pour que les crash dumps BEAM dans /tmp
              # (emptyDir) ne saturent pas le noeud en cas de crash en boucle
              ephemeralStorage: 256Mi
          # WHISPR-1340 : ajout des probes manquants pour que k8s detecte
          # les hangs/deadlocks et restart le pod automatiquement.
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: apns-key
              mountPath: /etc/apns
              readOnly: true
            # readOnlyRootFilesystem=true : Phoenix/Erlang écrit dans /tmp (BEAM crash dumps,
            # fichiers temp runtime). Ce volume emptyDir donne un /tmp writable en RAM.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: apns-key
          secret:
            secretName: notification-service-apns
            items:
              - key: AuthKey.p8
                path: AuthKey.p8
            optional: true
