apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: whispr-preprod
  labels:
    app: notification-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/whispr-messenger/notification-service:sha-9dd0d5f
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4011
            - name: grpc
              containerPort: 40011
          envFrom:
            - secretRef:
                name: notification-service-env
            - configMapRef:
                name: notification-service-config
          env:
            - name: DATABASE_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 384Mi
              cpu: 500m
          # WHISPR-1340 : ajout des probes manquants pour que k8s detecte
          # les hangs/deadlocks et restart le pod automatiquement.
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: apns-key
              mountPath: /etc/apns
              readOnly: true
            - name: fcm-key
              mountPath: /etc/fcm
              readOnly: true
      volumes:
        - name: apns-key
          secret:
            secretName: notification-service-apns
            items:
              - key: AuthKey.p8
                path: AuthKey.p8
            optional: true
        - name: fcm-key
          secret:
            secretName: notification-fcm-keyfile
            items:
              - key: keyfile.json
                path: keyfile.json
            optional: true
