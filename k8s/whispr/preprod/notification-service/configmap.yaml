apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: whispr-preprod
data:
  APNS_KEY_PATH: "/etc/apns/AuthKey.p8"
  APNS_KEY_ID: ""
  APNS_TEAM_ID: ""
  APNS_MODE: "dev"
  # FCM_PROJECT_ID : project Firebase exact (visible dans la console Firebase > Paramètres du projet).
  # Doit matcher le project_id du service-account JSON injecté via le secret
  # `notification-fcm-keyfile` (mounté à FCM_JSON_KEYFILE) ET le project_id du
  # google-services.json côté mobile-app, sinon FCM répond sender_id_mismatch
  # et le device est soft-deleted dès la 1re push.
  FCM_PROJECT_ID: "whispr-perso-test"
  FCM_JSON_KEYFILE: "/etc/fcm/keyfile.json"
