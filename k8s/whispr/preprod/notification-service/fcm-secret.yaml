---
# Firebase Cloud Messaging service-account credentials for preprod.
#
# PLACEHOLDER VALUE. Replace out-of-band before the Deployment can authenticate
# against Google FCM. Two supported options:
#
#   1) kubectl (ad-hoc):
#        kubectl -n whispr-preprod create secret generic notification-service-fcm \
#          --from-file=service-account.json=/path/to/real-key.json \
#          --dry-run=client -o yaml | kubectl apply -f -
#
#   2) Vault + vault-secrets-operator (preferred, aligns with prod pattern in
#      k8s/whispr/production/notification-service/vault-*.yaml). Store the JSON
#      at kv/whispr/preprod/notification-service/fcm and project a
#      VaultStaticSecret here.
#
# The stringData key MUST remain "service-account.json" — it is the filename
# mounted at /etc/fcm/service-account.json by the Deployment and referenced by
# FCM_JSON_KEYFILE in the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-fcm
  namespace: whispr-preprod
  labels:
    app: notification-service
  annotations:
    # Let the secret provider (kubectl/Vault) own the data field so ArgoCD
    # doesn't try to revert it back to this placeholder on every sync.
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: ServerSideApply=true
type: Opaque
stringData:
  service-account.json: |
    {
      "type": "service_account",
      "project_id": "whispr-perso-test",
      "private_key_id": "PLACEHOLDER_PRIVATE_KEY_ID",
      "private_key": "PLACEHOLDER_PRIVATE_KEY",
      "client_email": "PLACEHOLDER_CLIENT_EMAIL",
      "client_id": "PLACEHOLDER_CLIENT_ID",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
