---
# Firebase Cloud Messaging service-account credentials for preprod.
#
# The actual JSON is bootstrapped out-of-band (kubectl) and ArgoCD MUST NOT
# overwrite the data field. We therefore declare only the Secret shell here
# (metadata + type, no stringData), and rely on the annotations below so the
# field-level data is owned by the kubectl/Vault apply, not by Git.
#
# Bootstrap command (rerun if the credential is rotated):
#
#   kubectl -n whispr-preprod create secret generic notification-service-fcm \
#     --from-file=service-account.json=/path/to/real-key.json \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The data key MUST be "service-account.json" — it is the filename mounted at
# /etc/fcm/service-account.json by the Deployment and referenced by
# FCM_JSON_KEYFILE in the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-fcm
  namespace: whispr-preprod
  labels:
    app: notification-service
  annotations:
    # ServerSideApply lets ArgoCD reconcile metadata without taking ownership
    # of the data field; combined with the empty body below, the kubectl-applied
    # data survives every ArgoCD sync.
    argocd.argoproj.io/sync-options: ServerSideApply=true
type: Opaque
