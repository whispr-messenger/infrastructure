apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: whispr-preprod
  labels:
    app: user-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: user-service
          image: ghcr.io/whispr-messenger/user-service/user-service:sha-2d7ccde
          ports:
            - name: http
              containerPort: 3011
            - name: grpc
              containerPort: 50011
          envFrom:
            - secretRef:
                name: user-service-env
          env:
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /user/v1/health/ready
              port: 3011
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /user/v1/health/ready
              port: 3011
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /user/v1/health/ready
              port: 3011
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: whispr-preprod
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - name: http
      port: 3011
      targetPort: 3011
      nodePort: 30111
    - name: grpc
      port: 50011
      targetPort: 50011
