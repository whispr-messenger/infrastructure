apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: whispr-preprod
  labels:
    app: user-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      automountServiceAccountToken: false
      containers:
        - name: user-service
          image: ghcr.io/whispr-messenger/user-service/user-service:sha-ca81aa8
          ports:
            - name: http
              containerPort: 3011
            - name: grpc
              containerPort: 50011
          envFrom:
            - secretRef:
                name: user-service-env
            - configMapRef:
                name: user-service-config
          env:
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: SEED_ADMIN_USER_IDS
              value: "fab8817a-27a0-4537-89c1-be05f783150b,3378ee73-ce43-4145-b689-ba982d97721e"
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: shared-internal-api-token
                  key: INTERNAL_API_TOKEN
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          # WHISPR-1065 : startupProbe évite le livenessProbe prématuré pendant
          # le warm-up (Nest + TypeORM ~20-40 s). failureThreshold * periodSeconds
          # = 60 s max avant abandon du démarrage.
          startupProbe:
            httpGet:
              path: /user/v1/health/live
              port: 3011
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /user/v1/health/live
              port: 3011
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /user/v1/health/ready
              port: 3011
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
