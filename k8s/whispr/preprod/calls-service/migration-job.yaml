apiVersion: batch/v1
kind: Job
metadata:
  name: calls-service-migrate-preprod
  namespace: whispr-preprod
  labels:
    app: calls-service
    component: migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: calls-service
        component: migration
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-calls
      containers:
        - name: migrate
          image: ghcr.io/whispr-messenger/calls-service:sha-b4b2f0c
          imagePullPolicy: IfNotPresent
          command: ["/app/bin/whispr_calls"]
          args:
            - eval
            - WhisprCalls.Release.migrate()
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: calls-preprod-db
                  key: url
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: calls-preprod-secrets
                  key: secret_key_base
            # Required by runtime.exs even though the migration command doesn't
            # use JWT. When calls-service runtime.exs is refactored to only
            # require JWT_JWKS_URL for server boot, this can be removed.
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
            - name: PHX_HOST
              value: calls-preprod.roadmvn.com
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
