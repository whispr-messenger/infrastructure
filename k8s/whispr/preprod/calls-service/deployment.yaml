apiVersion: apps/v1
kind: Deployment
metadata:
  name: calls-service
  namespace: whispr-preprod
  labels:
    app: calls-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calls-service
  template:
    metadata:
      labels:
        app: calls-service
    spec:
      containers:
        - name: calls-service
          image: k3d-whispr-dev-registry:5000/calls-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4012
            - name: grpc
              containerPort: 40012
          envFrom:
            - secretRef:
                name: calls-service-env
            - configMapRef:
                name: calls-service-config
          env:
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
          # Wrapping volontaire dans une sh backgroundee : `exec bin/... start`
          # en PID 1 du container fait mourir le BEAM exit 1 ~8s apres boot.
          # En le lancant comme fils du shell (& + wait), le BEAM vit.
          # Probes + resources desactivees tant qu'on n'a pas root-cause.
          command:
            - sh
            - -c
            - |
              /app/bin/whispr_calls start &
              PID=$!
              wait $PID
