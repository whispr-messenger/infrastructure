apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: calls-service-preprod
  namespace: whispr-preprod
  labels:
    app: calls-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: calls-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
