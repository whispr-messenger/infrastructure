---
apiVersion: v1
kind: ConfigMap
metadata:
  name: expo-launcher-html
  namespace: whispr-preprod
data:
  expo-launch.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Whispr - Expo Go</title>
      <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; background: #f5f5f5; margin: 0; }
        h1 { color: #333; font-size: 22px; }
        .btn { display: inline-block; background: #4630EB; color: white; padding: 14px 28px;
               border-radius: 8px; text-decoration: none; font-size: 16px; margin: 16px 0; }
        .url { font-family: monospace; background: #eee; padding: 8px 12px; border-radius: 4px;
               font-size: 12px; word-break: break-all; margin: 8px 0; }
        #qr img { border: 4px solid white; box-shadow: 0 2px 8px rgba(0,0,0,.2); border-radius: 4px; }
        .status { font-size: 11px; color: #999; margin-top: 8px; }
        .loading { color: #aaa; font-size: 14px; margin: 40px 0; }
      </style>
    </head>
    <body>
      <h1>Whispr - Expo Go</h1>
      <p style="color:#666;font-size:13px">Scanne le QR ou appuie sur le bouton pour ouvrir dans Expo Go</p>
      <div id="qr"><p class="loading">Chargement...</p></div>
      <div id="link"></div>
      <p class="url" id="urltext">-</p>
      <p class="status" id="status">Recuperation de l'adresse tunnel...</p>

      <script>
        const STATUS_URL = '/expo-status';
        let lastUrl = '';

        function buildQrImgUrl(url) {
          return 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(url);
        }

        function setText(id, value) {
          document.getElementById(id).textContent = value;
        }

        function renderQr(url) {
          const qrBox = document.getElementById('qr');
          while (qrBox.firstChild) qrBox.removeChild(qrBox.firstChild);
          const img = document.createElement('img');
          img.src = buildQrImgUrl(url);
          img.width = 280;
          img.height = 280;
          img.alt = 'QR';
          qrBox.appendChild(img);
        }

        function renderLink(url) {
          const linkBox = document.getElementById('link');
          while (linkBox.firstChild) linkBox.removeChild(linkBox.firstChild);
          const a = document.createElement('a');
          a.className = 'btn';
          a.href = url;
          a.textContent = 'Ouvrir dans Expo Go';
          linkBox.appendChild(a);
        }

        function refresh() {
          fetch(STATUS_URL)
            .then(r => r.json())
            .then(data => {
              const url = data.url;
              if (!url) { setText('status', 'En attente du tunnel...'); return; }
              if (url === lastUrl) { setText('status', 'Derniere mise a jour: ' + new Date().toLocaleTimeString()); return; }
              lastUrl = url;
              renderQr(url);
              renderLink(url);
              setText('urltext', url);
              setText('status', 'Mis a jour: ' + new Date().toLocaleTimeString());
            })
            .catch(() => { setText('status', 'Connexion echouee, nouvelle tentative...'); });
        }

        refresh();
        setInterval(refresh, 15000);
      </script>
    </body>
    </html>
