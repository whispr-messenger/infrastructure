apiVersion: v1
kind: Secret
metadata:
  name: messaging-service-secret
  namespace: whispr-dev
  labels:
    app: messaging-service
    environment: development
type: Opaque
stringData:
  DB_USERNAME: whispr
  DB_PASSWORD: whispr_dev_password
  REDIS_PASSWORD: whispr_dev_password
  SECRET_KEY_BASE: dev_secret_key_base_64chars_minimum_change_this_in_prod_now
  ENCRYPTION_KEY: dev_encryption_key_change_in_prod
  JWT_SECRET: dev_jwt_secret_change_in_prod
