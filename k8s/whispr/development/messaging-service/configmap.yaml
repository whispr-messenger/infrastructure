apiVersion: v1
kind: ConfigMap
metadata:
  name: messaging-service-config
  namespace: whispr-dev
  labels:
    app: messaging-service
    tier: backend
    environment: development
data:
  MIX_ENV: "dev"
  PHX_SERVER: "true"
  PHX_HOST: "localhost"
  PORT: "4000"
  GRPC_PORT: "50051"
  LOG_LEVEL: "debug"
  POOL_SIZE: "5"
  DB_HOST: "postgres.whispr-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "messaging_service_db"
  REDIS_HOST: "redis.whispr-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "2"
  REDIS_MODE: "direct"
  AUTH_SERVICE_URL: "grpc://auth-service.whispr-dev.svc.cluster.local:50056"
  USER_SERVICE_URL: "grpc://user-service.whispr-dev.svc.cluster.local:50055"
  MEDIA_SERVICE_URL: "grpc://media-service.whispr-dev.svc.cluster.local:50054"
  NOTIFICATION_SERVICE_URL: "grpc://notification-service.whispr-dev.svc.cluster.local:4003"
  SCHEDULING_SERVICE_GRPC_URL: "scheduling-service.whispr-dev.svc.cluster.local:50052"
