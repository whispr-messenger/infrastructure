apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduling-service-config
  namespace: whispr-dev
  labels:
    app: scheduling-service
    tier: backend
    environment: development
data:
  NODE_ENV: "development"
  HTTP_PORT: "3004"
  GRPC_PORT: "50052"
  DB_TYPE: "postgres"
  DB_HOST: "postgres.whispr-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "scheduling_service_db"
  DB_MIGRATIONS_RUN: "true"
  DB_SYNCHRONIZE: "false"
  DB_LOGGING: "true"
  REDIS_HOST: "redis.whispr-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "4"
  REDIS_MODE: "direct"
  MESSAGING_SERVICE_HOST: "messaging-service.whispr-dev.svc.cluster.local"
  MESSAGING_SERVICE_PORT: "4000"
  NOTIFICATION_SERVICE_HOST: "notification-service.whispr-dev.svc.cluster.local"
  NOTIFICATION_SERVICE_PORT: "4002"
  ENABLE_CORS: "true"
  SWAGGER_ENABLED: "true"
  JWT_JWKS_URL: "http://auth-service.whispr-dev.svc.cluster.local:3001/auth/.well-known/jwks.json"
