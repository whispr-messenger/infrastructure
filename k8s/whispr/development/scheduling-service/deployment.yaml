apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-service
  namespace: whispr-dev
  labels:
    app: scheduling-service
    tier: backend
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduling-service
  template:
    metadata:
      labels:
        app: scheduling-service
    spec:
      containers:
        - name: whispr-scheduling-api
          image: scheduling-service:latest
          ports:
            - name: http
              containerPort: 3004
              protocol: TCP
            - name: grpc
              containerPort: 50052
              protocol: TCP
            - name: debug
              containerPort: 9229
              protocol: TCP
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: DB_PASSWORD
            - name: DB_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: REDIS_PASSWORD
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: JWT_REFRESH_SECRET
            - name: JWT_VERIFICATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: JWT_VERIFICATION_SECRET
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-secret
                  key: TWILIO_FROM_NUMBER
          envFrom:
            - configMapRef:
                name: scheduling-service-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
