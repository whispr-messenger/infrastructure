apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: whispr-dev
  labels:
    app: auth-service
    tier: backend
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: whispr-auth-api
          image: auth-service:latest
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            - name: grpc
              containerPort: 50056
              protocol: TCP
            - name: debug
              containerPort: 9229
              protocol: TCP
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: DB_PASSWORD
            - name: DB_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: DATABASE_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: REDIS_PASSWORD
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: JWT_REFRESH_SECRET
            - name: JWT_VERIFICATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: JWT_VERIFICATION_SECRET
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: TWILIO_FROM_NUMBER
            - name: JWT_PRIVATE_KEY_FILE
              value: /etc/jwt/jwt_private_key.pem
            - name: JWT_PUBLIC_KEY_FILE
              value: /etc/jwt/jwt_public_key.pem
          envFrom:
            - configMapRef:
                name: auth-service-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /auth/v1/health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /auth/v1/health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/jwt
              readOnly: true
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: jwt-keys
          secret:
            secretName: auth-service-secret
            items:
              - key: jwt_private_key.pem
                path: jwt_private_key.pem
              - key: jwt_public_key.pem
                path: jwt_public_key.pem
        - name: logs
          emptyDir: {}
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
