---
# ServiceAccount and RBAC for Prometheus kubernetes_sd_configs.
# Required so Prometheus can list/watch pods for auto-discovery.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-server
  namespace: whispr-dev
  labels:
    app: prometheus-server
    tier: infrastructure
    environment: development
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-server
  namespace: whispr-dev
  labels:
    app: prometheus-server
    tier: infrastructure
    environment: development
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-server
  namespace: whispr-dev
  labels:
    app: prometheus-server
    tier: infrastructure
    environment: development
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-server
subjects:
  - kind: ServiceAccount
    name: prometheus-server
    namespace: whispr-dev
