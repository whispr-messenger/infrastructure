---
# Prometheus ClusterIP service for dev.
# Grafana datasource points to: http://prometheus-server.whispr-dev.svc.cluster.local:9090
apiVersion: v1
kind: Service
metadata:
  name: prometheus-server
  namespace: whispr-dev
  labels:
    app: prometheus-server
    tier: infrastructure
    environment: development
spec:
  type: ClusterIP
  selector:
    app: prometheus-server
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
