apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: whispr-dev
  labels:
    app: notification-service
    tier: backend
    environment: development
data:
  MIX_ENV: "dev"
  PHX_SERVER: "true"
  PHX_HOST: "localhost"
  PORT: "4002"
  GRPC_PORT: "4003"
  LOG_LEVEL: "debug"
  POOL_SIZE: "5"
  DB_HOST: "postgres.whispr-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "notification_service_db"
  REDIS_HOST: "redis.whispr-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "3"
  REDIS_MODE: "direct"
  JWT_JWKS_URL: "http://auth-service.whispr-dev.svc.cluster.local:3001/auth/.well-known/jwks.json"
