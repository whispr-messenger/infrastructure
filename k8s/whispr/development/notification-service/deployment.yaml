apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: whispr-dev
  labels:
    app: notification-service
    tier: backend
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: whispr-notification-api
          image: notification-service:dev
          ports:
            - name: http
              containerPort: 4002
              protocol: TCP
            - name: grpc
              containerPort: 4003
              protocol: TCP
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "ecto://$(DB_USERNAME):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: REDIS_PASSWORD
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: SECRET_KEY_BASE
          envFrom:
            - configMapRef:
                name: notification-service-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "50m"
            limits:
              memory: "1536Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
