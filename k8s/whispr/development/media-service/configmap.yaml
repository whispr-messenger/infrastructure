apiVersion: v1
kind: ConfigMap
metadata:
  name: media-service-config
  namespace: whispr-dev
  labels:
    app: media-service
    tier: backend
    environment: development
data:
  NODE_ENV: "development"
  HTTP_PORT: "3003"
  GRPC_PORT: "50054"
  DB_TYPE: "postgres"
  DB_HOST: "postgres.whispr-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "media_service_db"
  DB_MIGRATIONS_RUN: "true"
  DB_SYNCHRONIZE: "false"
  DB_LOGGING: "true"
  REDIS_HOST: "redis.whispr-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "2"
  REDIS_MODE: "direct"
  S3_REGION: "us-east-1"
  S3_ENDPOINT: "http://minio.whispr-dev.svc.cluster.local:9000"
  S3_FORCE_PATH_STYLE: "true"
  ENABLE_CORS: "true"
  SWAGGER_ENABLED: "true"
  JWT_JWKS_URL: "http://auth-service.whispr-dev.svc.cluster.local:3001/auth/.well-known/jwks.json"
