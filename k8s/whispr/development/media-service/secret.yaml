apiVersion: v1
kind: Secret
metadata:
  name: media-service-secret
  namespace: whispr-dev
  labels:
    app: media-service
    environment: development
type: Opaque
stringData:
  DB_USERNAME: whispr
  DB_PASSWORD: whispr_dev_password
  REDIS_PASSWORD: whispr_dev_password
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  JWT_ACCESS_SECRET: dev_jwt_access_secret_change_in_prod
  JWT_REFRESH_SECRET: dev_jwt_refresh_secret_change_in_prod
  JWT_VERIFICATION_SECRET: dev_jwt_verification_secret_change_in_prod
