apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: whispr-dev
  labels:
    app: user-service
    tier: backend
    environment: development
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 3002
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50055
      targetPort: grpc
      protocol: TCP
