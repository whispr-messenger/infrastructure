apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: whispr-dev
  labels:
    app: user-service
    tier: backend
    environment: development
data:
  NODE_ENV: "development"
  HTTP_PORT: "3002"
  GRPC_PORT: "50055"
  DB_TYPE: "postgres"
  DB_HOST: "postgres.whispr-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "user_service_db"
  DB_MIGRATIONS_RUN: "false"
  DB_SYNCHRONIZE: "true"
  DB_LOGGING: "true"
  DB_SSL: "false"
  REDIS_HOST: "redis.whispr-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "1"
  REDIS_MODE: "direct"
  API_PREFIX: "/api/v1"
  ENABLE_CORS: "true"
  SWAGGER_ENABLED: "true"
  LOG_LEVEL: "debug"
  SERVICE_NAME: "user-service"
  SERVICE_VERSION: "1.0.0"
  JWT_JWKS_URL: "http://auth-service.whispr-dev.svc.cluster.local:3001/auth/.well-known/jwks.json"
