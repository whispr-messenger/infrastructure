---
# Grafana development service — ClusterIP on port 3000.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: whispr-dev
  labels:
    app: grafana
    tier: infrastructure
    environment: development
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
