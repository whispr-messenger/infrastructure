---
# Grafana datasource provisioning for local development.
# Points to the dev Prometheus instance in whispr-dev namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: whispr-dev
  labels:
    app: grafana
    tier: infrastructure
    environment: development
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.whispr-dev.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"
          httpMethod: POST
