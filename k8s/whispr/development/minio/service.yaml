apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: whispr-dev
  labels:
    app: minio
    tier: infrastructure
    environment: development
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: s3-api
      port: 9000
      targetPort: s3-api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
