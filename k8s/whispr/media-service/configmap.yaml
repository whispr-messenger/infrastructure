apiVersion: v1
kind: ConfigMap
metadata:
  name: media-service-config
  namespace: whispr-prod
  labels:
    app: media-service
    tier: backend
    environment: production
  annotations:
    description: "Non-sensitive configuration for media Service"

data:
  # Node Environment
  NODE_ENV: "production"

  # Server Ports
  HTTP_PORT: "3012"
  GRPC_PORT: "50012"

  # Database Configuration (non-sensitive)
  DB_TYPE: "postgres"
  DB_HOST: "postgresql.postgresql.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: media_service_db
  DB_MIGRATIONS_RUN: "false"
  DB_SYNCHRONIZE: "false"  # Should be false in production
  DB_LOGGING: "false"

  # Redis Configuration (non-sensitive)
  REDIS_HOST: "redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "4"

  # Redis Sentinel Configuration
  REDIS_MODE: "sentinel"
  REDIS_SENTINELS: "redis.redis.svc.cluster.local:26379"
  REDIS_MASTER_NAME: "mymaster"

  # gRPC Services URLs
  USER_SERVICE_GRPC_URL: "user-service:50011"
  MEDIA_SERVICE_GRPC_URL: "media-service:50012"

  # Swagger Configuration
  SWAGGER_ENABLED: "true"

  # Feature Flags
  ENABLE_CORS: "true"
  HOT_RELOAD: "false"  # Should be false in production

