apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: whispr-prod
  labels:
    app: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 4011
      targetPort: 4011
      protocol: TCP
    - name: grpc
      port: 40011
      targetPort: 40011
      protocol: TCP
