apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: whispr-prod
  labels:
    app: notification-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/whispr-messenger/notification-service:latest
          ports:
            - name: http
              containerPort: 4002
            - name: grpc
              containerPort: 40011
          envFrom:
            - secretRef:
                name: notification-service-env
          env:
            - name: DATABASE_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
          readinessProbe:
            httpGet:
              path: /ready
              port: 4002
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: notification-service
  ports:
    - name: http
      port: 4002
      targetPort: 4002
      nodePort: 30021
    - name: grpc
      port: 40011
      targetPort: 40011
