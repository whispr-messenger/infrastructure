apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whispr-citadel
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/whispr-messenger/infrastructure.git
    targetRevision: main
    path: k8s/whispr/citadel
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: whispr-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
