apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-web
  namespace: whispr-prod
  labels:
    app: mobile-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile-web
  template:
    metadata:
      labels:
        app: mobile-web
    spec:
      containers:
        - name: mobile-web
          image: ghcr.io/whispr-messenger/mobile-app/mobile-web:sha-f8ecaca
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3020
          readinessProbe:
            httpGet:
              path: /
              port: 3020
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-web
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: mobile-web
  ports:
    - name: http
      port: 3020
      targetPort: 3020
      nodePort: 30030
