---
# IngressRoute Traefik pour l'accès MinIO via sous-domaine dédié.
# Les URLs présignées générées par media-service utilisent ce domaine
# comme endpoint S3, ce qui garantit que la signature V4 inclut le bon
# Host header et que MinIO la valide correctement.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-subdomain
  namespace: minio
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`minio.whispr.devzeyu.com`)
      kind: Rule
      priority: 100
      services:
        - name: minio
          namespace: minio
          port: 9000
