---
apiVersion: v1
kind: ConfigMap
metadata:
  name: expo-launcher-html
  namespace: whispr-preprod
data:
  expo-launch.html: |
    <!DOCTYPE html>
    <html lang="zh">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Whispr — Expo Go</title>
      <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; background: #f5f5f5; margin: 0; }
        h1 { color: #333; font-size: 22px; }
        .btn { display: inline-block; background: #4630EB; color: white; padding: 14px 28px;
               border-radius: 8px; text-decoration: none; font-size: 16px; margin: 16px 0; }
        .url { font-family: monospace; background: #eee; padding: 8px 12px; border-radius: 4px;
               font-size: 12px; word-break: break-all; margin: 8px 0; }
        #qr img { border: 4px solid white; box-shadow: 0 2px 8px rgba(0,0,0,.2); border-radius: 4px; }
        .status { font-size: 11px; color: #999; margin-top: 8px; }
        .loading { color: #aaa; font-size: 14px; margin: 40px 0; }
      </style>
    </head>
    <body>
      <h1>Whispr — Expo Go</h1>
      <p style="color:#666;font-size:13px">扫码或点按钮用 Expo Go 打开</p>
      <div id="qr"><p class="loading">加载中...</p></div>
      <div id="link"></div>
      <p class="url" id="urltext">—</p>
      <p class="status" id="status">正在获取 tunnel 地址...</p>

      <script>
        const STATUS_URL = '/expo-status';
        let lastUrl = '';

        function buildQrImgUrl(url) {
          return 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(url);
        }

        function refresh() {
          fetch(STATUS_URL)
            .then(r => r.json())
            .then(data => {
              const url = data.url;
              if (!url) { document.getElementById('status').textContent = '等待 tunnel 启动...'; return; }
              if (url === lastUrl) { document.getElementById('status').textContent = '最后更新: ' + new Date().toLocaleTimeString(); return; }
              lastUrl = url;
              document.getElementById('qr').innerHTML = '<img src="' + buildQrImgUrl(url) + '" width="280" height="280" alt="QR">';
              document.getElementById('link').innerHTML = '<a class="btn" href="' + url + '">在 Expo Go 中打开</a>';
              document.getElementById('urltext').textContent = url;
              document.getElementById('status').textContent = '已更新: ' + new Date().toLocaleTimeString();
            })
            .catch(() => { document.getElementById('status').textContent = '连接失败，重试中...'; });
        }

        refresh();
        setInterval(refresh, 15000);
      </script>
    </body>
    </html>
