apiVersion: v1
kind: ConfigMap
metadata:
  name: media-service-config
  namespace: whispr-prod
  labels:
    app: media-service
    tier: backend
    environment: production
  annotations:
    description: "Non-sensitive configuration for media Service"

data:
  # Node Environment
  NODE_ENV: "production"

  # Server Ports
  HTTP_PORT: "3001"
  GRPC_PORT: "50051"

  # Database Configuration (non-sensitive)
  DB_TYPE: "postgres"
  DB_HOST: "postgresql.postgresql.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: media_service_db
  DB_MIGRATIONS_RUN: "false"
  DB_SYNCHRONIZE: "false"  # Should be false in production
  DB_LOGGING: "false"

  # Redis Configuration (non-sensitive)
  REDIS_HOST: "redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "4"

  # Redis Sentinel Configuration
  REDIS_MODE: "sentinel"
  REDIS_SENTINELS: "redis.redis.svc.cluster.local:26379"
  REDIS_MASTER_NAME: "mymaster"

  # gRPC Services URLs
  USER_SERVICE_GRPC_URL: "user-service:50052"
  MEDIA_SERVICE_GRPC_URL: "media-service:50053"

  # S3/MinIO Configuration
  S3_REGION: "eu-west-1"
  S3_ENDPOINT: "http://minio.minio.svc.cluster.local:9000"
  S3_FORCE_PATH_STYLE: "true"

  # Auth Configuration
  JWT_JWKS_URL: "http://auth-service.whispr-prod.svc.cluster.local:3001/auth/.well-known/jwks.json"

  # Swagger Configuration
  SWAGGER_ENABLED: "true"

  # Feature Flags
  ENABLE_CORS: "true"
  HOT_RELOAD: "false"  # Should be false in production

  # S3/MinIO Configuration
  S3_ENDPOINT: "http://minio.minio.svc.cluster.local:9000"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"
  S3_BUCKET: "whispr-media"

