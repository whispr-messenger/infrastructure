---
# VaultStaticSecret fetches S3/MinIO credentials from Vault
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: media-service-s3-secret
  namespace: whispr-prod
  annotations:
    description: "S3/MinIO credentials for media-service"
spec:
  vaultAuthRef: media-service-vault-auth
  mount: kv
  type: kv-v2
  path: whispr/minio/root
  destination:
    name: media-service-s3-secret
    create: true
  refreshAfter: 1h
