---
# VaultStaticSecret fetches S3/MinIO credentials from Vault
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: media-service-s3-secret
  namespace: whispr-prod
  annotations:
    description: "S3/MinIO credentials for media-service"
spec:
  vaultAuthRef: media-service-vault-auth
  mount: kv
  type: kv-v2
  path: whispr/minio/root
  destination:
    name: media-service-s3-secret
    create: true
    transformation:
      templates:
        S3_ACCESS_KEY_ID:
          text: "{{ index .data \"root-user\" }}"
        S3_SECRET_ACCESS_KEY:
          text: "{{ index .data \"root-password\" }}"
  refreshAfter: 1h
