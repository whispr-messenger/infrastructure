apiVersion: batch/v1
kind: Job
metadata:
  name: scheduling-service-migration
  namespace: whispr-prod
  labels:
    app: scheduling-service
    component: migration
    environment: production
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: scheduling-service
        component: migration
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: scheduling-service-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
      containers:
        - name: migration
          image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service:sha-78e7bc4
          command: ["/nodejs/bin/node"]
          args:
            - node_modules/typeorm/cli.js
            - migration:run
            - -d
            - dist/modules/app/migrations/migration.config.js
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-db-secret
                  key: password
            - name: DB_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: DATABASE_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          envFrom:
            - configMapRef:
                name: scheduling-service-config
            - secretRef:
                name: scheduling-service-db-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
