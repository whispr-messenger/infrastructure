apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: whispr-prod
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    for db in whispr_auth whispr_user whispr_media whispr_scheduling whispr_modulith whispr_messaging whispr_notification; do
      echo "Creating database $db (if not exists)..."
      psql -v ON_ERROR_STOP=0 --username "$POSTGRES_USER" --dbname postgres <<-EOSQL
        SELECT 'CREATE DATABASE $db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$db')\gexec
      EOSQL
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: whispr-prod
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - whispr_preprod
                - -d
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-data
          hostPath:
            path: /var/lib/whispr-k3s/postgres-data
            type: DirectoryOrCreate
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: whispr-prod
spec:
  type: ClusterIP
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
