apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: whispr-prod
  labels:
    app: auth-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/whispr-messenger/auth-service/auth-service:sha-ed71039
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
            - name: grpc
              containerPort: 50051
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-db-secret
                  key: password
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-redis-secret
                  key: username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-redis-secret
                  key: password
            - name: JWT_PRIVATE_KEY_FILE
              value: /app/secrets/jwt_private.pem
            - name: JWT_PUBLIC_KEY_FILE
              value: /app/secrets/jwt_public.pem
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-db-secret
            - secretRef:
                name: auth-service-redis-secret
            - secretRef:
                name: auth-service-redis-sentinel-secret
            - secretRef:
                name: auth-service-twilio-secret
          readinessProbe:
            httpGet:
              path: /auth/.well-known/jwks.json
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/secrets
              readOnly: true
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30010
    - name: grpc
      port: 50051
      targetPort: 50051
