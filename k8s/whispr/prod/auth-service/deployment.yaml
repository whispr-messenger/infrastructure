apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: whispr-prod
  labels:
    app: auth-service
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/whispr-messenger/auth-service/auth-service:sha-8433161
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3010
            - name: grpc
              containerPort: 50010
          env:
            - name: JWT_ISSUER
              value: "https://auth.whispr.epitech.beer"
            - name: JWT_AUDIENCE
              value: "whispr-api"
          envFrom:
            - secretRef:
                name: auth-service-env
          readinessProbe:
            httpGet:
              path: /auth/v1/health/ready
              port: 3010
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /auth/v1/health/ready
              port: 3010
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/secrets
              readOnly: true
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3010
      targetPort: 3010
      nodePort: 30010
    - name: grpc
      port: 50010
      targetPort: 50010
