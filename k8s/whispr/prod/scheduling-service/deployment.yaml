apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-service
  namespace: whispr-prod
  labels:
    app: scheduling-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: scheduling-service
  template:
    metadata:
      labels:
        app: scheduling-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scheduling-service
          image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service:sha-092f330
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 3013
            - name: grpc
              containerPort: 50013
          envFrom:
            - secretRef:
                name: scheduling-service-env
          env:
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: shared-internal-api-token
                  key: INTERNAL_API_TOKEN
            - name: DB_MIGRATIONS_RUN
              value: "true"
          startupProbe:
            httpGet:
              path: /health
              port: 3013
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3013
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3013
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
