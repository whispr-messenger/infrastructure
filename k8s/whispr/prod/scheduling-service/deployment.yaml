apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-service
  namespace: whispr-prod
  labels:
    app: scheduling-service
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: scheduling-service
  template:
    metadata:
      labels:
        app: scheduling-service
    spec:
      automountServiceAccountToken: false
      containers:
        - name: scheduling-service
          image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service:sha-0a33c0b
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3013
            - name: grpc
              containerPort: 50013
          envFrom:
            - secretRef:
                name: scheduling-service-env
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3013
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 3013
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: scheduling-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: scheduling-service
  ports:
    - name: http
      port: 3013
      targetPort: 3013
      nodePort: 30013
    - name: grpc
      port: 50013
      targetPort: 50013
