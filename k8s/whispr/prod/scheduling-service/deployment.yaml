apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-service
  namespace: whispr-prod
  labels:
    app: scheduling-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduling-service
  template:
    metadata:
      labels:
        app: scheduling-service
    spec:
      containers:
        - name: scheduling-service
          image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service:sha-dc1027d
          ports:
            - name: http
              containerPort: 3000
            - name: grpc
              containerPort: 3001
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scheduling-service-db-secret
                  key: password
            - name: JWT_JWKS_URL
              value: http://auth-service:3001/auth/.well-known/jwks.json
          envFrom:
            - configMapRef:
                name: scheduling-service-config
            - secretRef:
                name: scheduling-service-db-secret
            - secretRef:
                name: scheduling-service-redis-sentinel-secret
            - secretRef:
                name: scheduling-service-public-jwt-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: scheduling-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: scheduling-service
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30013
    - name: grpc
      port: 3001
      targetPort: 3001
  template:
    spec:
      containers:
        - image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service:sha-5ae2655
