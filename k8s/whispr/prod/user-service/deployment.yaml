apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: whispr-prod
  labels:
    app: user-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/whispr-messenger/user-service/user-service:sha-b2c2979
          ports:
            - name: http
              containerPort: 3011
            - name: grpc
              containerPort: 50011
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: user-service-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-db-secret
                  key: password
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-service-db-secret
            - secretRef:
                name: user-service-redis-sentinel-secret
            - secretRef:
                name: user-service-public-jwt-secret
          readinessProbe:
            httpGet:
              path: /user/health/ready
              port: 3011
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - name: http
      port: 3011
      targetPort: 3011
      nodePort: 30011
    - name: grpc
      port: 50011
      targetPort: 50011
  template:
    spec:
      containers:
        - image: ghcr.io/whispr-messenger/user-service/user-service:sha-4a98c58
