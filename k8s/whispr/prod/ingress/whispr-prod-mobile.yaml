apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
  name: whispr-prod-mobile
  namespace: whispr-prod
spec:
  ingressClassName: nginx
  rules:
  - host: whispr.roadmvn.com
    http:
      paths:
      - backend:
          service:
            name: mobile-web
            port:
              number: 3020
        path: /
        pathType: Prefix
