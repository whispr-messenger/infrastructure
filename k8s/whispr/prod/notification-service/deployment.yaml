apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: whispr-prod
  labels:
    app: notification-service
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      automountServiceAccountToken: false
      containers:
        - name: notification-service
          image: ghcr.io/whispr-messenger/notification-service:sha-ff3c8a0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4011
            - name: grpc
              containerPort: 40011
          envFrom:
            - secretRef:
                name: notification-service-env
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: notification-service
  ports:
    - name: http
      port: 4011
      targetPort: 4011
      nodePort: 30021
    - name: grpc
      port: 40011
      targetPort: 40011
