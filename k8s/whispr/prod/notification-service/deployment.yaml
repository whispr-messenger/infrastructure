apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: whispr-prod
  labels:
    app: notification-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification-service
          image: ghcr.io/whispr-messenger/notification-service:sha-0d19e71
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 4011
            - name: grpc
              containerPort: 40011
          envFrom:
            - secretRef:
                name: notification-service-env
            - configMapRef:
                name: notification-service-config
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            failureThreshold: 15
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 4011
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4011
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: apns-key
              mountPath: /etc/apns
              readOnly: true
      volumes:
        - name: apns-key
          secret:
            secretName: notification-service-apns
            items:
              - key: AuthKey.p8
                path: AuthKey.p8
            optional: true
