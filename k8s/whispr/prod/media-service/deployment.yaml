apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: whispr-prod
  labels:
    app: media-service
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ghcr.io/whispr-messenger/media-service/media-service:sha-75a56e7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3012
            - name: grpc
              containerPort: 50012
          envFrom:
            - secretRef:
                name: media-service-env
          readinessProbe:
            httpGet:
              path: /media/v1/health/ready
              port: 3012
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /media/v1/health/ready
              port: 3012
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: media-service
  ports:
    - name: http
      port: 3012
      targetPort: 3012
      nodePort: 30012
    - name: grpc
      port: 50012
      targetPort: 50012
  template:
    spec:
      containers:
        - image: ghcr.io/whispr-messenger/media-service/media-service:sha-75a56e7
