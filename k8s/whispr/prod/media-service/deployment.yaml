apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: whispr-prod
  labels:
    app: media-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ghcr.io/whispr-messenger/media-service/media-service:latest
          ports:
            - name: http
              containerPort: 3012
            - name: grpc
              containerPort: 50012
          envFrom:
            - secretRef:
                name: media-service-env
          env:
            - name: DB_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
            - name: MINIO_ENDPOINT
              value: minio
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
            - name: S3_ACCESS_KEY_ID
              value: whispr_minio
            - name: S3_SECRET_ACCESS_KEY
              value: "8b6f83b30ff6c715427be7e802141271"
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_REGION
              value: us-east-1
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /media/health/ready
              port: 3012
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: whispr-prod
spec:
  type: NodePort
  selector:
    app: media-service
  ports:
    - name: http
      port: 3012
      targetPort: 3012
      nodePort: 30012
    - name: grpc
      port: 50012
      targetPort: 50012
