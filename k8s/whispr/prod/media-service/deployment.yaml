apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: whispr-prod
  labels:
    app: media-service
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: media-service
          image: ghcr.io/whispr-messenger/media-service/media-service:sha-023fc86
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 3012
            - name: grpc
              containerPort: 50012
          envFrom:
            - secretRef:
                name: media-service-env
          env:
            - name: MINIO_ENDPOINT
              value: minio.whispr-prod.svc.cluster.local
            - name: JWT_JWKS_URL
              value: http://auth-service:3010/auth/.well-known/jwks.json
            - name: S3_ENDPOINT
              value: http://minio.whispr-prod.svc.cluster.local:9000
            - name: S3_PUBLIC_ENDPOINT
              value: https://whispr-api.roadmvn.com
            - name: S3_FORCE_PATH_STYLE
              value: "true"
            - name: S3_REGION
              value: us-east-1
            - name: NODE_ENV
              value: production
          startupProbe:
            httpGet:
              path: /media/v1/health/live
              port: 3012
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /media/v1/health/live
              port: 3012
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /media/v1/health/ready
              port: 3012
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
