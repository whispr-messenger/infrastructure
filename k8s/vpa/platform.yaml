---
# VPA objects for platform components — ArgoCD & Vault
# updateMode: Off → recommender only, no automatic updates

# ─── ArgoCD Server ──────────────────────────────────────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app: argocd-server
    managed-by: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argocd-server
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: argocd-server
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi
        controlledResources: ["cpu", "memory"]

---
# ─── ArgoCD Repo Server ─────────────────────────────────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app: argocd-repo-server
    managed-by: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argocd-repo-server
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: argocd-repo-server
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi
        controlledResources: ["cpu", "memory"]

---
# ─── ArgoCD Application Controller ─────────────────────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: argocd-application-controller
  namespace: argocd
  labels:
    app: argocd-application-controller
    managed-by: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: argocd-application-controller
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: argocd-application-controller
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi
        controlledResources: ["cpu", "memory"]

---
# ─── Vault ──────────────────────────────────────────────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
    managed-by: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: vault
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: vault
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
        controlledResources: ["cpu", "memory"]

---
# ─── ArgoCD Redis HA Server ────────────────────────────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: argocd-redis-ha-server
  namespace: argocd
  labels:
    app: argocd-redis-ha-server
    managed-by: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: argocd-redis-ha-server
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: redis
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
        controlledResources: ["cpu", "memory"]
      - containerName: sentinel
        minAllowed:
          cpu: 10m
          memory: 32Mi
        maxAllowed:
          cpu: 200m
          memory: 128Mi
        controlledResources: ["cpu", "memory"]
