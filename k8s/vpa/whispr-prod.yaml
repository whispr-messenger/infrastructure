---
# VPA objects for all whispr-prod microservices
# updateMode: Off → recommender collects data but does NOT auto-update pods
# Review recommendations after 24h with:
#   kubectl get vpa -n whispr-prod
#   kubectl describe vpa <name> -n whispr-prod

# ─── auth-service ───────────────────────────────────────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: auth-service
  namespace: whispr-prod
  labels:
    app: auth-service
    managed-by: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 5m
          memory: 64Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
        controlledResources: ["cpu", "memory"]

