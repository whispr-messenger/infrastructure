---
# VPA object for moderation-service (whispr-prod)
# updateMode: Off → recommender collects data, no automatic pod updates
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: moderation-service
  namespace: whispr-prod
  labels:
    app: moderation-service
    managed-by: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moderation-service
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 5m
          memory: 64Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
        controlledResources: ["cpu", "memory"]
