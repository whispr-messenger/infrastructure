---
# PostgreSQL dynamic roles
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: DatabaseSecretEngineRole
metadata:
  name: role-auth-service
  namespace: vault-config-operator-system
spec:
  authentication:
    path: kubernetes
    role: vco-admin
  path: database
  dBName: postgres
  name: role_auth_service
  creationStatements:
    - |
      CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';
      GRANT role_auth_service_group TO "{{name}}";
      ALTER ROLE "{{name}}" SET ROLE role_auth_service_group;
  defaultTTL: "1h"
  maxTTL: "24h"
---
