---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devzeyu-mobile-web
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/whispr-messenger/infrastructure.git
    # On vise zeyu/preprod et un path devzeyu-spécifique pour utiliser
    # l'image locale patchée (same-origin API) sans être écrasé par les
    # bumps automatiques de deploy/preprod.
    targetRevision: zeyu/preprod
    path: k8s/whispr/devzeyu/mobile-web
  destination:
    server: https://kubernetes.default.svc
    namespace: whispr-preprod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
