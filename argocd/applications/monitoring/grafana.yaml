apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  sources:
    - repoURL: https://github.com/whispr-messenger/infrastructure/
      targetRevision: main
      path: helm/grafana

    - repoURL: https://github.com/whispr-messenger/infrastructure/
      targetRevision: main
      path: k8s/grafana

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
