---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deploy-kargo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://github.com/whispr-messenger/deploy.git
    targetRevision: main
    path: kargo
  destination:
    server: https://kubernetes.default.svc
    namespace: whispr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
